alg_name: "MEMIT"
model_name: "/root/autodl-tmp/models/bloomz-1b7"
stats_dir: "./data/stats"
device: 0
layers: [7, 14, 21]  # BloomZ-1b7 共 24 层，取中间层
fact_token: "subject_last"
v_num_grad_steps: 16
v_lr: 1e-1
v_loss_layer: 23
v_weight_decay: 0.1
clamp_norm_factor: 3
kl_factor: 0.0625
mom2_adjustment: false

layer_selection: "all"
mom2_update_weight: 10000
# ==================== BLOOM 官方 MEMIT 适配结构 ====================
rewrite_module_tmp: "transformer.h.{}.mlp.dense_4h_to_h"
layer_module_tmp: "transformer.h.{}"
mlp_module_tmp: "transformer.h.{}.mlp"
attn_module_tmp: "transformer.h.{}.self_attention"
ln_f_module: "transformer.ln_f"
lm_head_module: "transformer.word_embeddings"
# ==============================================================

mom2_dataset: "wikipedia"
mom2_n_samples: 10000
mom2_dtype: "float32"
model_parallel: false
# fp16: true